services:
  db:
    image: postgres:15
    container_name: task_manager_db
    environment:
      POSTGRES_DB: task_manager_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d task_manager_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: task_manager_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
